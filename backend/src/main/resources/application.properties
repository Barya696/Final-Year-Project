spring.application.name=backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/universite-ndjamena
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JSON/Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# JWT Configuration
jwt.secret=MyVerySecretKeyThatIsAtLeast32CharactersLong!
jwt.expiration=86400000

# Auth / password reset (local dev: expose 6-digit reset code in forgot-password JSON; disable in production)
app.security.expose-dev-otp=true
app.password-reset.expose-token-in-response=true

# SMTP — set MAIL_USERNAME / MAIL_PASSWORD (Gmail App Password) via env or application-local.properties (gitignored).
# Do not commit real credentials. Frontend URL used in reset emails (link to reset page):
app.password-reset.frontend-base-url=${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173}
# Optional; defaults to MAIL_USERNAME when blank (Gmail usually requires From = account).
app.mail.from=${MAIL_FROM:}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Logging
logging.level.root=INFO
logging.level.td.universite_ndjamena=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Local overrides (MAIL_*, etc.) must load LAST so they are not wiped by spring.mail.* placeholders above.
spring.config.import=optional:classpath:application-local.properties
